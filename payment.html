<!DOCTYPE html>
<html>
<head>
  <title>Payment | Smart Furnish</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>


<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">Smart Furnish</div>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="products.html">Buy</a>
    <a href="sell.html">Sell</a>
    <a href="cart.html">Cart</a>
  </div>
</div>

<div class="pay-summary">
  <h3>Total Amount Payable</h3>
  <p id="payAmount">₹0</p>
</div>

<!-- ADDRESS -->
<div class="address-box">
  <h2>Shipping Address</h2>

  <input type="text" id="fullName" placeholder="Full Name">
  <input type="text" id="mobile" placeholder="Mobile Number">

  <textarea id="address" placeholder="House No, Street, Area"></textarea>

  <div class="row">
    <input type="text" id="city" placeholder="City">
    <input type="text" id="pincode" placeholder="Pincode">
  </div>

  <input type="text" id="state" placeholder="State">
</div>

<!-- PAYMENT -->
<div class="payment-container">
  <h2>Select Payment Method</h2>

  <div class="payment-methods">
    <button onclick="showCard()">💳 Card</button>
    <button onclick="showUPI()">📱 UPI</button>
    <button onclick="cashOnDelivery()">💵 COD</button>
  </div>

  <div id="cardForm" class="pay-box hidden">
    <h3>Card Payment</h3>
    <input type="text" placeholder="Card Holder Name">
    <input type="text" placeholder="Card Number" maxlength="16">
    <div class="row">
      <input type="text" placeholder="MM/YY" maxlength="5">
      <input type="password" placeholder="CVV" maxlength="3">
    </div>
    <button onclick="processPayment('card')">Pay Now</button>
  </div>

  <div id="upiForm" class="pay-box hidden">
    <h3>UPI Payment</h3>
    <input type="text" placeholder="example@upi">
    <button onclick="processPayment('upi')">Pay Now</button>
  </div>
</div>

<!-- SUCCESS MODAL -->
<div id="successModal" class="modal hidden">
  <div class="modal-box">
    <h2>✅ Payment Successful</h2>
    <p>Your order has been placed successfully.</p>
    <button onclick="goHome()">Go to Home</button>
    <button onclick="window.location.href='track.html'">Track Order</button>
  </div>
</div>

<script src="payment.js"></script>
</body>
</html>
